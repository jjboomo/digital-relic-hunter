name: Relic Hunter Daily Scan

on:
  schedule:
    # 每天 UTC 时间凌晨 2 点（北京时间上午 10 点）准时唤醒服务器
    - cron: '0 2 * * *'
  workflow_dispatch: 
    # 允许在网页上手动点击按钮强行启动

jobs:
  hunt:
    runs-on: ubuntu-latest # 使用微软白给的 Ubuntu 算力
    # 👇 就是加上这两行，告诉 GitHub 提前使用 Node 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 直接暴力安装依赖，省去 requirements.txt
        pip install requests openai 

    - name: Run Hunter Script
      env:
        # 把刚才存入保险库的密钥，作为环境变量发给 Python 脚本
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      run: python hunter.py

    - name: Commit and Push the Report
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Relic Hunter Agent"
        git add Daily_Report.md
        # 检查文件有没有变化，有变化就 Commit 并 Push 回这个仓库
        git diff-index --quiet HEAD || (git commit -m "🤖 自动报告：猎人带回了今日的宝藏" && git push)
